name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          git log --format="%H" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | while read -r sha; do
            if ! git log -1 --format="%B" "$sha" | grep -qE "^Signed-off-by: .+ <.+@.+>"; then
              echo "FAIL: commit $sha is missing a Signed-off-by line"
              git log -1 --oneline "$sha"
              exit 1
            fi
          done
          echo "DCO check passed"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage gate (90% total)
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$3); print $3}')
          echo "Total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 90) { print "FAIL: total coverage " p "% < 90%"; exit 1 } }'
      - name: Per-package coverage floor (85%)
        run: |
          # Guard against dilution: every package must independently meet 85%,
          # so a weak unit cannot hide behind high-coverage packages. The six
          # canonical-type packages are at 100%; cmd/relay is capped below 100%
          # only by main()/ListenAndServe and build-metadata branches.
          fail=0
          while read -r pkg cov; do
            v=${cov%\%}
            if awk -v p="$v" 'BEGIN { exit !(p+0 < 85) }'; then
              echo "FAIL: ${pkg} ${cov} < 85%"
              fail=1
            fi
          done < <(go test -cover ./... | awk '/coverage:/{print $2, $5}')
          [ "$fail" -eq 0 ] && echo "All packages >= 85%"
          exit $fail

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  fusa:
    name: go-FuSa full safety lifecycle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
      - name: Install gofusa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@latest
      # ── Gating stages (fail the build) ──────────────────────────────────────
      - name: gofusa check (gate on ERROR findings)
        run: gofusa check
      - name: gofusa trace (gate on 100% requirement traceability)
        run: gofusa trace -req-coverage 100
      - name: gofusa cyber (cybersecurity analysis)
        run: gofusa cyber
      - name: gofusa vuln (dependency vulnerability scan)
        run: gofusa vuln
      - name: gofusa qualify (tool qualification suite)
        run: gofusa qualify
      # ── Full-lifecycle evidence generation (per RELAY spec §20.1) ───────────
      - name: gofusa verify (test evidence bundle)
        run: gofusa verify || true
      - name: gofusa fmea (dFMEA)
        run: gofusa fmea
      - name: gofusa boundary (architecture diagram)
        run: gofusa boundary || true
      - name: gofusa coupling (data/control coupling)
        run: gofusa coupling || true
      - name: gofusa release (SBOM + build provenance, SLSA)
        run: gofusa release || true
      - name: Compliance gap reports (ISO 26262 / DO-178C / SLSA / ISO 21434)
        run: |
          gofusa iso26262 || true
          gofusa do178 || true
          gofusa slsa || true
          gofusa iso21434 || true
      - name: gofusa audit-pack (bundle all evidence)
        run: gofusa audit-pack --output gofusa-audit-pack.zip || true
      - name: Upload safety evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gofusa-safety-evidence
          path: |
            *.json
            *.csv
            *.mermaid
            gofusa-audit-pack.zip
          if-no-files-found: ignore

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --tag relay:ci .
      - name: Smoke-test binary in image
        run: docker run --rm relay:ci version

  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
