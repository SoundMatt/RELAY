version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
    errcheck:
      # Writes to CLI stdout/stderr: the returned error is conventionally
      # unactionable (broken pipe aside) and checking each call adds only noise.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
